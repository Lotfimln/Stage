server {
    listen 80;
    server_name lotfimelouane.com www.lotfimelouane.com;

    # Redirect HTTP -> HTTPS (uncomment after certbot setup)
    # return 301 https://$host$request_uri;

    # --- For initial setup (before HTTPS) ---
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static files directly (faster)
    location /css/ {
        alias /opt/csr-irit/frontend/css/;
        expires 1d;
    }
    location /js/ {
        alias /opt/csr-irit/frontend/js/;
        expires 1d;
    }
}

